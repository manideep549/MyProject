name: Salesforce CI/CD Pipeline (Delta Deployment)

on:
  push:
    branches:
      - dev
      - uat
      - main

jobs:

########################################################
# VALIDATION JOB
########################################################

  validate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

########################################################
# Install Salesforce CLI
########################################################

      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --global
          sf version

########################################################
# Install Delta Plugin
########################################################

      - name: Install sfdx-git-delta Plugin
        run: |
          echo y | sf plugins install sfdx-git-delta

########################################################
# Authenticate Salesforce Org
########################################################

      - name: Authenticate Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
            --sfdx-url-file auth.txt \
            --alias targetOrg

########################################################
# Generate Delta Package
########################################################

      - name: Generate Delta
        run: |
          rm -rf delta

          sf sgd source delta \
            --to HEAD \
            --from HEAD~1 \
            --output-dir delta

########################################################
# Debug Delta Output
########################################################

      - name: Show Delta Files
        run: |
          echo "Generated delta files:"
          ls -R delta

########################################################
# Skip if No Metadata Changes
########################################################

      - name: Check Metadata Changes
        run: |
          if [ ! -f "delta/package/package.xml" ]; then
            echo "No metadata changes detected. Skipping validation."
            exit 0
          fi

########################################################
# Validate Deployment
########################################################

      - name: Validate Delta Deployment
        run: |
          sf project deploy validate \
            --manifest delta/package/package.xml \
            --target-org targetOrg \
            --wait 30


########################################################
# DEPLOYMENT JOB
########################################################

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    environment: production

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

########################################################
# Install Salesforce CLI
########################################################

      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --global

########################################################
# Install Delta Plugin
########################################################

      - name: Install sfdx-git-delta Plugin
        run: |
          echo y | sf plugins install sfdx-git-delta

########################################################
# Authenticate Org
########################################################

      - name: Authenticate Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
            --sfdx-url-file auth.txt \
            --alias targetOrg

########################################################
# Generate Delta Again
########################################################

      - name: Generate Delta
        run: |
          rm -rf delta

          sf sgd source delta \
            --to HEAD \
            --from HEAD~1 \
            --output-dir delta

########################################################
# Show Delta Files
########################################################

      - name: Debug Delta Files
        run: |
          ls -R delta

########################################################
# Skip Deployment if No Changes
########################################################

      - name: Check Metadata
        run: |
          if [ ! -f "delta/package/package.xml" ]; then
            echo "No metadata changes detected. Skipping deployment."
            exit 0
          fi

########################################################
# Deploy Delta Metadata
########################################################

      - name: Deploy Delta Metadata
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --target-org targetOrg \
            --wait 30