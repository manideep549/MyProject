name: Salesforce CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - uat
      - main

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      ########################################################
      # Install Salesforce CLI
      ########################################################

      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --global
          sf version


      ########################################################
      # Install Delta Deployment Tool
      ########################################################

      - name: Install SFDX Git Delta
        run: |
          npm install sfdx-git-delta -g


      ########################################################
      # Authenticate Salesforce Org
      ########################################################

      - name: Authenticate Salesforce Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
          --sfdx-url-file auth.txt \
          --alias targetOrg


      ########################################################
      # Generate Delta Package
      ########################################################

      - name: Generate Delta Package
        run: |
          mkdir delta

          sgd:source:delta \
          --to HEAD \
          --from HEAD~1 \
          --output delta


      ########################################################
      # Debug Delta Output
      ########################################################

      - name: Show Delta Package
        run: |
          echo "Delta package content:"
          ls -R delta


      ########################################################
      # Validate Deployment
      ########################################################

      - name: Validate Delta Deployment
        run: |
          sf project deploy validate \
          --manifest delta/package/package.xml \
          --target-org targetOrg \
          --wait 30


  deploy:

    needs: validate

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    environment: production

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      ########################################################
      # Install Salesforce CLI
      ########################################################

      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --global


      ########################################################
      # Install Delta Tool
      ########################################################

      - name: Install SFDX Git Delta
        run: |
          npm install sfdx-git-delta -g


      ########################################################
      # Authenticate Org
      ########################################################

      - name: Authenticate Salesforce Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
          --sfdx-url-file auth.txt \
          --alias targetOrg


      ########################################################
      # Generate Delta Again
      ########################################################

      - name: Generate Delta Package
        run: |
          mkdir delta

          sgd:source:delta \
          --to HEAD \
          --from HEAD~1 \
          --output delta


      ########################################################
      # Deploy Delta Metadata
      ########################################################

      - name: Deploy Delta Metadata
        run: |
          sf project deploy start \
          --manifest delta/package/package.xml \
          --target-org targetOrg \
          --wait 30