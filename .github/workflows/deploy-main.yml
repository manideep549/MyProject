name: Main Deployment Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Salesforce CLI
      run: |
        npm install @salesforce/cli --global
        sf version

    - name: Install jq
      run: |
        sudo apt-get update
        sudo apt-get install jq -y

    ########################################################
    # AUTH
    ########################################################
    - name: Authenticate Org
      run: |
        echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
        sf org login sfdx-url --sfdx-url-file auth.txt --alias prodOrg

    ########################################################
    # READ TEST CLASSES
    ########################################################
    - name: Prepare Test Classes
      run: |
        TEST_ARGS=""
        while IFS= read -r line
        do
          CLASS=$(echo $line | xargs)
          if [ ! -z "$CLASS" ]; then
            TEST_ARGS="$TEST_ARGS --tests $CLASS"
          fi
        done < Testclass

        echo "TEST_ARGS=$TEST_ARGS" >> $GITHUB_ENV

    ########################################################
    # DEPLOY
    ########################################################
    - name: Deploy to Salesforce
      id: deploy
      run: |
        set +e

        sf project deploy start \
          --target-org prodOrg \
          --source-dir force-app \
          $TEST_ARGS \
          --wait 30

        if [ $? -eq 0 ]; then
          echo "DEPLOY_STATUS=SUCCESS" >> $GITHUB_ENV
        else
          echo "DEPLOY_STATUS=FAILURE" >> $GITHUB_ENV
          exit 1
        fi

    ########################################################
    # 🔥 AUTO DOCUMENTATION (ONLY SUCCESS)
    ########################################################
    - name: Generate Deployment Report
      if: success()
      run: |
        chmod +x scripts/generate-doc.sh
        ./scripts/generate-doc.sh

    ########################################################
    # UPLOAD REPORT
    ########################################################
    - name: Upload Report
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: deployment-report
        path: docs/deployments/

    ########################################################
    # COMMIT REPORT
    ########################################################
    - name: Commit Report
      if: success()
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add docs/deployments/
        git commit -m "Auto deployment report [skip ci]" || echo "No changes"
        git push