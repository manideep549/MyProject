name: Salesforce DevOps Pipeline

on:
  push:
    branches: [ main, uat, dev ]

jobs:
  salesforce-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Authenticate
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth_url.txt
          sf org login sfdx-url -f auth_url.txt -a target_org

      - name: Prepare Test Logic
        id: test_prep
        run: |
          # Read lines, strip whitespace, and create a comma-separated list
          if [ -f tests_to_run.txt ]; then
            TESTS=$(grep -v '^$' tests_to_run.txt | tr '\n' ',' | sed 's/,$//')
          else
            TESTS=""
          fi
          
          if [ -z "$TESTS" ]; then
            echo "No tests found. Skipping test execution."
            echo "test_level=NoTestRun" >> $GITHUB_OUTPUT
            echo "test_list=" >> $GITHUB_OUTPUT
          else
            echo "Tests found: $TESTS"
            echo "test_level=RunSpecifiedTests" >> $GITHUB_OUTPUT
            echo "test_list=$TESTS" >> $GITHUB_OUTPUT
          fi

      - name: Validation (Dev/UAT)
        if: github.ref != 'refs/heads/main'
        run: |
          if [ "${{ steps.test_prep.outputs.test_level }}" == "NoTestRun" ]; then
            sf project deploy validate --source-dir force-app --test-level NoTestRun --target-org target_org
          else
            sf project deploy validate --source-dir force-app --test-level RunSpecifiedTests --tests ${{ steps.test_prep.outputs.test_list }} --target-org target_org
          fi

      - name: Deployment (Main Branch)
        if: github.ref == 'refs/heads/main'
        run: |
          if [ "${{ steps.test_prep.outputs.test_level }}" == "NoTestRun" ]; then
            sf project deploy start --source-dir force-app --test-level NoTestRun --target-org target_org --wait 30
          else
            sf project deploy start --source-dir force-app --test-level RunSpecifiedTests --tests ${{ steps.test_prep.outputs.test_list }} --target-org target_org --wait 30
          fi