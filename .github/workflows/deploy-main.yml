name: Salesforce Deployment Pipeline

on:
  push:
    branches:
      - dev
      - uat
      - main
    # ONLY trigger if files in these folders change
    paths:
      - 'force-app/main/default/classes/**'
      - 'force-app/main/default/triggers/**'
      - 'force-app/main/default/lwc/**'
      - 'force-app/main/default/aura/**'
      - 'Testclass' # Run if the test manifest itself changes

jobs:
  salesforce-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Authenticate Salesforce Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth_url.txt
          sf org login sfdx-url -f auth_url.txt -a target_org
          rm auth_url.txt

      - name: Read Test Classes
        id: tests
        run: |
          TESTS=$(sed 's/\r//g' Testclass | grep -v '^$' | xargs | tr ' ' ',')
          echo "test_classes=$TESTS" >> $GITHUB_OUTPUT

      - name: Validate Deployment
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level RunSpecifiedTests \
            --tests "${{ steps.tests.outputs.test_classes }}" \
            --target-org target_org \
            --wait 30

      - name: Run Apex Tests With Coverage
        run: |
          sf apex run test \
            --tests "${{ steps.tests.outputs.test_classes }}" \
            --target-org target_org \
            --code-coverage \
            --result-format json \
            --output-dir test-results

      - name: Enforce 76 Percent Coverage
        run: |
          COVERAGE=$(jq '.summary.orgWideCoverage' test-results/test-result-*.json | tr -d '"%')
          if (( $(echo "$COVERAGE < 76" | bc -l) )); then
            echo "Code coverage $COVERAGE% is below 76%."
            exit 1
          fi

      - name: Deploy to Org (MAIN Only)
        if: github.ref == 'refs/heads/main'
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunSpecifiedTests \
            --tests "${{ steps.tests.outputs.test_classes }}" \
            --target-org target_org