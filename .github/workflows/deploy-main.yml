name: Salesforce CI/CD Pipeline (Delta Deployment)

on:
  push:
    branches:
      - dev
      - uat
      - main

jobs:

  ########################################################
  # VALIDATION JOB
  ########################################################

  validate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      ########################################################
      # Install Salesforce CLI
      ########################################################

      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --global
          sf version


      ########################################################
      # Install Delta Tool
      ########################################################

      - name: Install SFDX Git Delta
        run: |
          npm install sfdx-git-delta -g


      ########################################################
      # Authenticate Salesforce Org
      ########################################################

      - name: Authenticate Salesforce Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
          --sfdx-url-file auth.txt \
          --alias targetOrg


      ########################################################
      # Generate Delta Package
      ########################################################

      - name: Generate Delta Package
        run: |

          rm -rf delta
          mkdir delta

          sgd:source:delta \
          --to HEAD \
          --from HEAD~1 \
          --output delta


      ########################################################
      # Debug Delta Package
      ########################################################

      - name: Show Delta Package
        run: |
          echo "Delta package content:"
          ls -R delta


      ########################################################
      # Skip if No Metadata Changes
      ########################################################

      - name: Check If Metadata Exists
        run: |

          if [ ! -f "delta/package/package.xml" ]; then
            echo "No metadata changes detected. Skipping validation."
            exit 0
          fi


      ########################################################
      # Validate Deployment
      ########################################################

      - name: Validate Delta Deployment
        run: |
          sf project deploy validate \
          --manifest delta/package/package.xml \
          --target-org targetOrg \
          --wait 30


  ########################################################
  # DEPLOYMENT JOB
  ########################################################

  deploy:

    needs: validate
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    environment: production

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      ########################################################
      # Install Salesforce CLI
      ########################################################

      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --global


      ########################################################
      # Install Delta Tool
      ########################################################

      - name: Install SFDX Git Delta
        run: |
          npm install sfdx-git-delta -g


      ########################################################
      # Authenticate Salesforce Org
      ########################################################

      - name: Authenticate Salesforce Org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
          --sfdx-url-file auth.txt \
          --alias targetOrg


      ########################################################
      # Generate Delta Again
      ########################################################

      - name: Generate Delta Package
        run: |

          rm -rf delta
          mkdir delta

          sgd:source:delta \
          --to HEAD \
          --from HEAD~1 \
          --output delta


      ########################################################
      # Debug Delta Files
      ########################################################

      - name: Show Delta Files
        run: |
          ls -R delta


      ########################################################
      # Skip Deployment if No Changes
      ########################################################

      - name: Check Metadata Before Deploy
        run: |

          if [ ! -f "delta/package/package.xml" ]; then
            echo "No metadata changes detected. Skipping deployment."
            exit 0
          fi


      ########################################################
      # Deploy Delta Metadata
      ########################################################

      - name: Deploy Delta Metadata
        run: |

          echo "Deploying changed metadata..."

          sf project deploy start \
          --manifest delta/package/package.xml \
          --target-org targetOrg \
          --wait 30