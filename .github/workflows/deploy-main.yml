name: Salesforce DevOps Pipeline

on:
  push:
    branches:
      - dev
      - uat
      - main

jobs:
  salesforce-ci:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Salesforce CLI
      run: npm install @salesforce/cli --global

    - name: Setup Java (Required for PMD)
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: '11'

    - name: Install PMD
      run: |
        wget https://github.com/pmd/pmd/releases/download/pmd_releases/6.55.0/pmd-bin-6.55.0.zip
        unzip pmd-bin-6.55.0.zip
        echo "$PWD/pmd-bin-6.55.0/bin" >> $GITHUB_PATH

    - name: Authenticate Salesforce Org
      run: |
        echo "${{ secrets.SFDX_AUTH_URL }}" > auth_url.txt
        sf org login sfdx-url -f auth_url.txt -a target_org

    - name: Run Apex PMD Scan
      run: |
        echo "Running Apex PMD Scan"
        pmd-bin-6.55.0/bin/run.sh pmd \
          -d force-app \
          -R category/apex/bestpractices.xml,category/apex/design.xml \
          -f text \
          -minimumpriority 2

    - name: Read Test Classes
      id: tests
      run: |
        if [ ! -f tests_to_run.txt ]; then
          echo "tests_to_run.txt file not found"
          exit 1
        fi

        TESTS=$(grep -v '^$' tests_to_run.txt | tr '\n' ',' | sed 's/,$//')

        echo "Tests to run: $TESTS"

        echo "test_classes=$TESTS" >> $GITHUB_OUTPUT

    - name: Validate Deployment (DEV / UAT)
      if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/uat'
      run: |
        echo "Running validation for DEV/UAT"

        sf project deploy validate \
          --source-dir force-app \
          --test-level RunSpecifiedTests \
          --tests "${{ steps.tests.outputs.test_classes }}" \
          --target-org target_org \
          --wait 30 \
          --verbose

    - name: Validate Deployment (MAIN)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Validating deployment for MAIN"

        sf project deploy validate \
          --source-dir force-app \
          --test-level RunSpecifiedTests \
          --tests "${{ steps.tests.outputs.test_classes }}" \
          --target-org target_org \
          --wait 30 \
          --verbose

    - name: Run Apex Tests With Coverage
      run: |
        echo "Running Apex Tests with Coverage"

        sf apex run test \
          --tests "${{ steps.tests.outputs.test_classes }}" \
          --target-org target_org \
          --wait 30 \
          --code-coverage \
          --result-format json \
          --output-dir test-results

    - name: Show Coverage Report
      run: |
        echo "Coverage Summary"
        jq '.summary' test-results/test-result-*.json

    - name: Enforce 76 Percent Coverage
      run: |
        COVERAGE=$(jq '.summary.orgWideCoverage' test-results/test-result-*.json)

        echo "Org Coverage: $COVERAGE%"

        if (( $(echo "$COVERAGE < 76" | bc -l) )); then
          echo "Code coverage below 76%. Failing pipeline."
          exit 1
        else
          echo "Coverage requirement satisfied."
        fi

    - name: Deploy to Org (MAIN)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Deploying to Salesforce Org"

        sf project deploy start \
          --source-dir force-app \
          --test-level RunSpecifiedTests \
          --tests "${{ steps.tests.outputs.test_classes }}" \
          --target-org target_org \
          --wait 30 \
          --verbose