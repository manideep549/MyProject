name: Merge Validation Gate

on:
  workflow_dispatch:

jobs:
  check-pipelines:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Check CI Pipeline Status
        uses: actions/github-script@v7
        with:
          script: |
            const workflows = [
              "Salesforce CI/CD Pipeline",
              "Salesforce PMD Validation and Test Coverage"
            ];

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            for (const workflowName of workflows) {

              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowName,
                per_page: 1
              });

              const run = runs.data.workflow_runs[0];

              if (!run || run.conclusion !== "success") {
                core.setFailed(`Workflow ${workflowName} has not succeeded.`);
              }

              console.log(`${workflowName} status: ${run.conclusion}`);
            }

      - name: Merge Allowed
        run: |
          echo "Both pipelines succeeded. Merge is allowed."