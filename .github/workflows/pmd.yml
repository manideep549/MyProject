name: Salesforce PMD Validation and Test Coverage

on:
  push:
    branches: [dev, uat, main]
  pull_request:
    branches: [dev, uat, main]

jobs:
  salesforce-ci:
    runs-on: ubuntu-latest

    steps:

    # Checkout Code
    - name: Checkout Source Code
      uses: actions/checkout@v4


    # Install Salesforce CLI
    - name: Install Salesforce CLI
      run: |
        npm install @salesforce/cli --global
        sf version


    # Install PMD
    - name: Install PMD
      run: |
        wget https://github.com/pmd/pmd/releases/download/pmd_releases%2F7.0.0/pmd-dist-7.0.0-bin.zip
        unzip pmd-dist-7.0.0-bin.zip
        echo "$(pwd)/pmd-bin-7.0.0/bin" >> $GITHUB_PATH


    # Install jq for JSON parsing
    - name: Install jq
      run: |
        sudo apt-get update
        sudo apt-get install jq -y


    ########################################################
    # STAGE 1 — PMD Static Code Analysis
    ########################################################

    - name: Run PMD Static Analysis
      run: |
        echo "Running PMD Static Analysis"

        pmd check \
        --dir force-app \
        --rulesets category/apex/design.xml,category/apex/bestpractices.xml \
        --format text \
        --fail-on-violation


    ########################################################
    # STAGE 2 — Authenticate Salesforce Org
    ########################################################

    - name: Authenticate Salesforce Org
      run: |
        echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
        sf org login sfdx-url --sfdx-url-file auth.txt --set-default --alias ciOrg


    ########################################################
    # STAGE 3 — Debug Testclass File
    ########################################################

    - name: Show Testclass File
      run: |
        echo "Contents of Testclass file:"
        cat Testclass


    ########################################################
    # STAGE 4 — Prepare Test Classes
    ########################################################

    - name: Prepare Test Classes
      run: |

        if [ ! -f "Testclass" ]; then
          echo "ERROR: Testclass file not found"
          exit 1
        fi

        TEST_ARGS=""

        while IFS= read -r line
        do
          CLASS=$(echo $line | xargs)

          if [ ! -z "$CLASS" ]; then
            TEST_ARGS="$TEST_ARGS --tests $CLASS"
          fi

        done < Testclass

        if [ -z "$TEST_ARGS" ]; then
          echo "ERROR: No test classes found in Testclass file"
          exit 1
        fi

        echo "Prepared Test Arguments:"
        echo $TEST_ARGS

        echo "TEST_ARGS=$TEST_ARGS" >> $GITHUB_ENV


    ########################################################
    # STAGE 5 — Run Apex Tests
    ########################################################

    - name: Run Apex Tests
      run: |

        echo "Running Apex Tests"

        sf apex test run \
          --target-org ciOrg \
          $TEST_ARGS \
          --wait 30 \
          --result-format json \
          --code-coverage \
          --output-dir test-results

        echo "Test execution completed"


    ########################################################
    # STAGE 6 — Debug Generated Files
    ########################################################

    - name: Show Test Result Files
      run: |
        echo "Generated files:"
        ls -R test-results


    ########################################################
    # STAGE 7 — Display Test Failures
    ########################################################

    - name: Display Test Failures
      run: |

        RESULT_FILE=$(ls test-results | grep ".json" | grep -v "codecoverage")

        echo "Using result file: $RESULT_FILE"

        FAILURES=$(jq '.result.summary.failing' test-results/$RESULT_FILE)

        echo "Failing Tests: $FAILURES"

        if [ "$FAILURES" -gt 0 ]; then
          echo "Some tests failed"
          jq '.result.tests[] | select(.Outcome=="Fail")' test-results/$RESULT_FILE
          exit 1
        fi


    ########################################################
    # STAGE 8 — Validate Code Coverage
    ########################################################

    - name: Validate Code Coverage
      run: |

        RESULT_FILE=$(ls test-results | grep ".json" | grep -v "codecoverage")

        echo "Using result file: $RESULT_FILE"

        COVERAGE=$(jq '.result.summary.testRunCoverage' test-results/$RESULT_FILE)

        echo "Total Code Coverage: $COVERAGE%"

        if [ "$COVERAGE" -lt 75 ]; then
          echo "Code coverage below 75%"
          exit 1
        else
          echo "Coverage requirement satisfied"
        fi