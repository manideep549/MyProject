name: PMD Static Analysis and Apex Validation

on:
  push:
    branches: [ dev, uat, main ]
  pull_request:
    branches: [ dev, uat, main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4

      - name: 'Install Salesforce CLI'
        run: |
          npm install @salesforce/cli --global
          sf version

      - name: 'Install PMD'
        run: |
          wget https://github.com/pmd/pmd/releases/download/pmd_releases%2F7.0.0/pmd-dist-7.0.0-bin.zip
          unzip pmd-dist-7.0.0-bin.zip
          echo "$(pwd)/pmd-bin-7.0.0/bin" >> $GITHUB_PATH

      # PMD scan updated to look inside MyProject/force-app
      - name: 'Run PMD Scan'
        run: |
          pmd check --dir MyProject/force-app --rulesets category/apex/design.xml,category/apex/bestpractices.xml --format text --fail-on-violation

      - name: 'Authenticate to Sandbox for Testing'
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth_url.txt
          sf org login sfdx-url --sfdx-url-file auth_url.txt --set-default --alias testOrg

      # Preparing test class list from MyProject/testclass
      - name: 'Prepare Test Class List'
        id: prepare_tests
        run: |
          if [ ! -f "MyProject/testclass" ]; then
            echo "Error: 'testclass' file not found in 'MyProject/' folder!"
            exit 1
          fi
          TEST_LIST=$(grep -v '^$' MyProject/testclass | tr -d '\r' | tr '\n' ',' | sed 's/,$//')
          echo "TEST_LIST=$TEST_LIST" >> $GITHUB_ENV

      # Running tests using the prepared list
      - name: 'Run Apex Tests & Show Errors'
        run: |
          sf apex test run --target-org testOrg --wait 30 --tests "${{ env.TEST_LIST }}" --result-format human --code-coverage --detailed-coverage

      - name: 'Check Test Percentage'
        run: |
          sf apex test run --target-org testOrg --tests "${{ env.TEST_LIST }}" --result-format json --code-coverage > coverage-results.json
          COVERAGE=$(jq '.result.summary.testRunCoverage' coverage-results.json | tr -d '"%')
          echo "REPORTED CODE COVERAGE: $COVERAGE%"
          if [ "$(echo "$COVERAGE < 75" | bc)" -eq 1 ]; then
            echo "FAILED: Coverage is $COVERAGE%, below 75%."
            exit 1
          fi